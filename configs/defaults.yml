collect_all_logbooks: True
delete_all_tmp_files: False
n_generations: 10
early_stop_n_valid_points: 10000
early_stop_n_restarts: 10
restart: False
verbose: True
HT: False
Do_Chisq: False
penalty:
  use_seeds: True
  parameter:
    model: Null # "hbos" # Set none to ignore parameter density penalty
    warmup: 0
    cooldown: True
    focus: []
