    model: "hbos" #  Set none to ignore observable density penalty
    warmup: 0
    cooldown: True
    focus: ["ghjee_s(1)","ghjbb_s(1)"]
rs:
  n_population: 100
cmaes:
  sigma: 0.01
  centroid_seed: Null
  no_good_patience_restart: 7500
